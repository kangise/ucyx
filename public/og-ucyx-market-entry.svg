    <text x="0" y="96" font-family="Inter, Arial, sans-serif" font-size="82" font-weight="900" fill="#0b0f0d">for Chinese brands.</text>
    <text x="0" y="210" font-family="Inter, Arial, sans-serif" font-size="31" font-weight="500" fill="#46514c">Decide where to enter, design the test, coordinate delivery, and evaluate ROI.</text>
