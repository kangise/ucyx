    <text x="172" y="28" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="850">Design</text>
    <text x="298" y="28" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="850">Delivery</text>
    <text x="430" y="28" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="850">ROI review</text>
