<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-label="UCYX market entry support for Chinese brands">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#eef4f0"/>
    </linearGradient>
    <radialGradient id="pulse" cx="72%" cy="42%" r="50%">
      <stop offset="0" stop-color="#00a651" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#00a651" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="30" flood-color="#0b0f0d" flood-opacity="0.12"/>
    </filter>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#pulse)"/>
  <g opacity="0.22" fill="none" stroke="#00a651" stroke-width="3">
    <path d="M690 278 C780 218 858 220 970 172"/>
    <path d="M690 278 C802 304 888 330 1048 308"/>
    <path d="M690 278 C786 382 884 432 1026 486"/>
  </g>
  <g fill="#00a651">
