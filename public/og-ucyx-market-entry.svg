    <circle cx="970" cy="172" r="7"/>
    <circle cx="1048" cy="308" r="7"/>
    <circle cx="1026" cy="486" r="7"/>
  </g>
  <g transform="translate(76 72)">
    <text x="0" y="0" dominant-baseline="hanging" font-family="Inter, Arial, sans-serif" font-size="54" font-weight="900" fill="#12104a" font-style="italic">UCYX</text>
    <rect x="202" y="30" width="28" height="36" rx="6" fill="#ffcc00"/>
    <rect x="242" y="16" width="28" height="20" rx="6" fill="#34c759"/>
